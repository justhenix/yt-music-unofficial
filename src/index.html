<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Music</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #101010;
        color: #f4f4f5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(520px, calc(100vw - 48px));
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 650;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #b7b7bd;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>YouTube Music</h1>
      <p>The native window should open YouTube Music directly. If you see this page, the remote webview did not start.</p>
    </main>
  </body>
</html>
